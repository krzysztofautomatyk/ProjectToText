<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="ProjectToText — main UI with file tree and XML packed output">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#010409" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#010409"/>
  <rect x="40" y="36" width="1200" height="648" rx="14" fill="#0d1117" stroke="#30363d" filter="url(#sh)"/>

  <!-- title bar -->
  <rect x="40" y="36" width="1200" height="52" rx="14" fill="#161b22"/>
  <rect x="40" y="74" width="1200" height="14" fill="#161b22"/>
  <rect x="40" y="87" width="1200" height="1" fill="#30363d"/>
  <circle cx="68" cy="62" r="6" fill="#ff5f57"/>
  <circle cx="90" cy="62" r="6" fill="#febc2e"/>
  <circle cx="112" cy="62" r="6" fill="#28c840"/>
  <rect x="140" y="48" width="30" height="30" rx="8" fill="url(#g)"/>
  <text x="148" y="68" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="800" fill="#fff">pt</text>
  <text x="180" y="58" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="650" fill="#e6edf3">ProjectToText</text>
  <text x="180" y="74" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#6e7681">Pack projects for LLMs · git-native</text>
  <rect x="420" y="50" width="300" height="26" rx="13" fill="#0d1117" stroke="#30363d"/>
  <text x="438" y="67" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#8b949e">~/code/my-app</text>
  <rect x="980" y="50" width="130" height="28" rx="6" fill="#238636"/>
  <text x="1000" y="68" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff">Copy packed</text>
  <rect x="1120" y="50" width="90" height="28" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="1146" y="68" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#c9d1d9">Save</text>

  <!-- toolbar -->
  <rect x="40" y="88" width="1200" height="40" fill="#161b22"/>
  <rect x="40" y="127" width="1200" height="1" fill="#30363d"/>
  <rect x="56" y="96" width="200" height="24" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="70" y="112" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#6e7681">Filter files…</text>
  <rect x="272" y="96" width="64" height="24" rx="6" fill="rgba(88,166,255,0.15)" stroke="rgba(88,166,255,0.4)"/>
  <text x="286" y="112" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600" fill="#58a6ff">Source</text>
  <text x="348" y="112" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#8b949e">Docs</text>
  <text x="392" y="112" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#8b949e">All clean</text>
  <text x="1100" y="112" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#8b949e"><tspan fill="#e6edf3" font-weight="650">12</tspan> / 48 files</text>

  <!-- tree -->
  <rect x="40" y="128" width="340" height="520" fill="#0d1117"/>
  <rect x="379" y="128" width="1" height="520" fill="#30363d"/>
  <text x="56" y="152" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#8b949e" letter-spacing="0.8">FILES</text>
  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">
    <rect x="52" y="164" width="312" height="28" rx="5" fill="#1f2a3a"/>
    <text x="64" y="183" fill="#c9d1d9">▾ src/ <tspan fill="#6e7681" font-size="11">8/10</tspan></text>
    <text x="84" y="211" fill="#58a6ff">☑ main.rs</text>
    <text x="84" y="237" fill="#58a6ff">☑ lib.rs</text>
    <text x="84" y="263" fill="#58a6ff">☑ core/walker.rs</text>
    <text x="84" y="289" fill="#58a6ff">☑ core/output.rs</text>
    <text x="64" y="321" fill="#c9d1d9">▾ ui/</text>
    <text x="84" y="347" fill="#6e7681">☐ node_modules/</text>
    <text x="84" y="373" fill="#58a6ff">☑ src/App.tsx</text>
    <text x="64" y="405" fill="#58a6ff">☑ README.md</text>
    <text x="64" y="431" fill="#58a6ff">☑ Cargo.toml</text>
    <text x="64" y="457" fill="#6e7681">☐ Cargo.lock</text>
    <text x="64" y="483" fill="#58a6ff">☑ .pttignore</text>
  </g>

  <!-- preview header -->
  <rect x="380" y="128" width="860" height="40" fill="#161b22"/>
  <rect x="380" y="167" width="860" height="1" fill="#30363d"/>
  <text x="400" y="154" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="650" fill="#e6edf3">Packed output</text>
  <text x="530" y="154" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#8b949e">File list</text>
  <text x="600" y="154" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#8b949e">File</text>
  <rect x="1040" y="140" width="70" height="22" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="1056" y="155" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#c9d1d9">XML ▾</text>
  <rect x="1120" y="140" width="96" height="22" rx="11" fill="rgba(63,185,80,0.12)" stroke="rgba(63,185,80,0.3)"/>
  <text x="1134" y="155" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600" fill="#3fb950">~12k tokens</text>

  <!-- code -->
  <rect x="396" y="180" width="828" height="440" rx="8" fill="#0d1117" stroke="#30363d"/>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">
    <text x="416" y="208" fill="#7ee787">&lt;project_context&gt;</text>
    <text x="432" y="232" fill="#8b949e">&lt;source&gt;<tspan fill="#c9d1d9">ptt · my-app</tspan>&lt;/source&gt;</text>
    <text x="432" y="256" fill="#8b949e">&lt;directory_structure&gt;</text>
    <text x="448" y="280" fill="#c9d1d9">src/main.rs</text>
    <text x="448" y="304" fill="#c9d1d9">src/lib.rs</text>
    <text x="448" y="328" fill="#c9d1d9">src/core/walker.rs</text>
    <text x="432" y="352" fill="#8b949e">&lt;/directory_structure&gt;</text>
    <text x="432" y="376" fill="#8b949e">&lt;files&gt;</text>
    <text x="448" y="400" fill="#79c0ff">&lt;file path="src/main.rs"&gt;</text>
    <text x="464" y="424" fill="#8b949e">&lt;![CDATA[</text>
    <text x="480" y="448" fill="#c9d1d9">fn main() {</text>
    <text x="480" y="472" fill="#c9d1d9">  ptt::run().expect("ok");</text>
    <text x="480" y="496" fill="#c9d1d9">}</text>
    <text x="464" y="520" fill="#8b949e">]]&gt;</text>
    <text x="448" y="544" fill="#79c0ff">&lt;/file&gt;</text>
    <text x="448" y="568" fill="#6e7681">…</text>
    <text x="416" y="596" fill="#7ee787">&lt;/project_context&gt;</text>
  </g>

  <!-- status -->
  <rect x="40" y="648" width="1200" height="36" fill="#161b22"/>
  <rect x="40" y="648" width="1200" height="1" fill="#30363d"/>
  <text x="56" y="671" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#6e7681">my-app · ~/code/my-app</text>
  <text x="900" y="671" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#8b949e">Selected <tspan fill="#e6edf3" font-weight="650">12</tspan> · ~<tspan fill="#58a6ff" font-weight="650">12k</tspan> tokens · xml</text>
</svg>
