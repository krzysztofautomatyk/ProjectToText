# Multi-platform desktop binaries + GitHub Release assets.
# Trigger: push a version tag, e.g. `git tag v0.1.2 && git push origin v0.1.2`
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-notes:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      body_path: release-notes.md
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog section
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          export VERSION TAG
          python3 - <<'PY' > release-notes.md
          import pathlib, re, os
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          version = os.environ.get("VERSION", "")
          tag = os.environ.get("TAG", version)
          patterns = [
              rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## |\Z)",
              r"## \[Unreleased\][^\n]*\n(.*?)(?=\n## |\Z)",
          ]
          body = ""
          for pat in patterns:
              m = re.search(pat, text, re.S)
              if m and m.group(1).strip():
                  body = m.group(1).strip()
                  break
          if not body:
              body = f"Release {tag} of ProjectToText (ptt)."
          header = f"""## ProjectToText {tag}

Prebuilt **desktop** installers are attached below (macOS / Windows / Linux).

Also available after install or `cargo build --release`:

```bash
ptt pack . -o context.xml
ptt pack ./my-app -f markdown -o context.md
```

Build from source: see [README](https://github.com/krzysztofautomatyk/ProjectToText#readme).

---
"""
          print(header + body)
          PY

      - name: Upload notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  publish-tauri:
    name: Build (${{ matrix.label }})
    needs: release-notes
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS-aarch64
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            label: macOS-x86_64
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            label: Linux-x86_64
            args: ""
            rust_target: ""
          - platform: windows-latest
            label: Windows-x86_64
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.label }}

      - name: Install Linux Tauri system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm --prefix ui ci

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ProjectToText ${{ github.ref_name }}"
          releaseBodyFile: release-notes.md
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
